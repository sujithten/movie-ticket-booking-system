version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: movie-booking-db
    environment:
      POSTGRES_DB: movie_booking
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
